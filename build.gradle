apply plugin: 'application'
apply plugin: 'cpp'
apply plugin: TestingModelBasePlugin
//apply plugin: 'findbugs'

// At top level of build.gradle
def currentOs = org.gradle.internal.os.OperatingSystem.current()
def currentArch = System.getProperty("os.arch")
def osName = org.gradle.internal.os.OperatingSystem.current()
def platform = org.gradle.internal.os.OperatingSystem.current().isMacOsX() ? 'mac-aarch64' :
               org.gradle.internal.os.OperatingSystem.current().isLinux() ? 'linux' : 'win'
def isLinux = org.gradle.internal.os.OperatingSystem.current().isLinux()
def isMac = currentOs.isMacOsX()
def isWindows = currentOs.isWindows()
def javafxVersion = '21.0.1'

mainClassName = 'billiards.viewer.Main'

repositories {
    mavenCentral()
}

dependencies {
    // When getting the version number for a dependency, don't go to Maven Central and
    // simply search for the package you want. You will often find many versions of the
    // package, most of which are unofficial or out-of-date. Instead, go to the website
    // of the package, and they will usually give you the correct Maven information there.
    implementation 'org.eclipse.collections:eclipse-collections-api:9.2.0'  // All the interfaces
    implementation 'org.eclipse.collections:eclipse-collections:9.2.0'  // The actual classes
    implementation 'com.google.guava:guava:25.1-jre'
    implementation 'org.apache.commons:commons-math3:3.6.1'
    implementation 'org.apache.commons:commons-lang3:3.7'  // can remove this now I think?
    implementation 'org.apache.commons:commons-io:1.3.2'
    implementation 'io.javaslang:javaslang:2.0.5'
    implementation "org.openjfx:javafx-base:${javafxVersion}:${platform}"
    implementation "org.openjfx:javafx-controls:${javafxVersion}:${platform}"
    implementation "org.openjfx:javafx-graphics:${javafxVersion}:${platform}"
    implementation "org.openjfx:javafx-fxml:${javafxVersion}:${platform}"
    implementation 'org.xerial:sqlite-jdbc:3.41.2.2'
    implementation 'net.java.dev.jna:jna:5.13.0'
    implementation 'org.fxmisc.richtext:richtextfx:0.10.4'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.2.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.2.0'
}

test {
    useJUnitPlatform()
}

compileJava {
    //options.compilerArgs << '-Xlint' << '-Werror'
    options.compilerArgs << '-Xlint'

    if (platform == 'linux') {
        options.compilerArgs += [
            '--module-path', '/usr/share/openjfx/lib',
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    } else {
        options.compilerArgs += [
            '--module-path', configurations.runtimeClasspath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

jar {
    archivesBaseName = 'billiard-viewer'
    if (System.getProperty('os.name').toLowerCase().contains('linux')) {
        dependsOn "backendSharedLibrary"

    }
    duplicatesStrategy(DuplicatesStrategy.EXCLUDE)
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
        configurations.compileClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
exclude 'META-INF/*.RSA', 'META-INF/*.SF','META-INF/*.DSA'
    manifest.attributes 'Main-Class': 'billiards.viewer.Main'
}

sourceSets {
    main {
        java {
            srcDir 'src/java'
        }

        //resources {
            //srcDir 'css'
        //}
    }
}

//applicationDefaultJvmArgs = ['-server', '-Djna.library.path=./build/libs/backend/shared/', '-Xss1000m']
applicationDefaultJvmArgs = ['-server', '-Djna.library.path=./build/libs/backend/shared/', '-Xss8m', '-Xmx4G']
sourceCompatibility = 1.17
targetCompatibility = 1.17

model {

    components {

        backend(NativeLibrarySpec) {


            binaries.all {

                cppCompiler.define "NDEBUG"
                cppCompiler.args '-O3', '-march=native', '-flto', '-ftrapv'
                // Aug,8 2025 Marco,Mai
                // for Aplle Arm platnorm there is an instruction to use java17 natively
                if (currentOs.isMacOsX()){
                    cppCompiler.args '-I/opt/homebrew/include'
                   // May, 27 2026, Suryansh Ankur
                   // Upgrading to Apple GPU
                    //cppCompiler.args "-I${projectDir}/metal-cpp", '-I/opt/homebrew/include'
                    // boost_system is header-only since Boost 1.69 and no longer ships as a library, so it is not linked.
                    linker.args '-headerpad_max_install_names', '-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread'
                    // <-- NEW FOR METAL: Added the Apple Framework linker flags
                    //linker.args '-headerpad_max_install_names', '-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-framework', 'Metal', '-framework', 'Foundation', '-framework', 'QuartzCore','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread', '-lboost_system'
                
                } else {
                    linker.args '-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb12','-lboost_thread', '-lboost_system'
                }
                
                if (toolChain in Clang) {
                    cppCompiler.args '-Werror',
                                     '-Wno-padded', '-Wno-comma',
                                     '-Wno-exit-time-destructors', '-Wno-global-constructors',
                                     '-Wno-c++98-compat', '-Wno-c++98-compat-pedantic',
                                     '-std=c++17'
                }

                if (toolChain in Gcc) {
                    cppCompiler.args '-Wextra', '-Wpedantic', '-Werror',
                                     '-Wno-c++11-compat', '-Wno-c++14-compat',
                                     '-std=c++17'
                }

                checkedBy $.tasks.testBackend
            }
        }

        test(NativeExecutableSpec) {

            sources.cpp {
                lib library: 'backend', linkage: 'static'
            }

            binaries.all {

                cppCompiler.define "NDEBUG"
                cppCompiler.args '-O3', '-march=native', '-flto', '-ftrapv'
                // Aug,8 2025 Marco,Mai
                // for Aplle Arm platnorm there is an instruction to use java17 natively
                if (currentOs.isMacOsX()){
                    cppCompiler.args '-I/opt/homebrew/include'
                    // May, 27 2026 , Suryansh Ankur
                   // Upgrading to Apple GPU
                    //cppCompiler.args "-I${projectDir}/metal-cpp", '-I/opt/homebrew/include'
                    // boost_system is header-only since Boost 1.69 and no longer ships as a library, so it is not linked.
                    linker.args '-headerpad_max_install_names','-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-lboost_unit_test_framework','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread'
                    // <-- NEW FOR METAL: Added the Apple Framework linker flags
                    //linker.args '-headerpad_max_install_names','-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-framework', 'Metal', '-framework', 'Foundation', '-framework', 'QuartzCore','-lboost_unit_test_framework','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread','-lboost_system'
                } else {
                    linker.args '-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread','-lboost_system'
                }

                if (toolChain in Clang) {
                    cppCompiler.args  '-Werror',
                                     '-Wno-padded', '-Wno-comma',
                                     '-Wno-disabled-macro-expansion', '-Wno-global-constructors',
                                     '-Wno-c++98-compat', '-Wno-c++98-compat-pedantic',
                                     '-std=c++17'
                }

                if (toolChain in Gcc) {
                    cppCompiler.args '-Wall', '-Wextra', '-Wpedantic', '-Werror',
                                     '-Wno-c++11-compat', '-Wno-c++14-compat',
                                     '-std=c++17'
                }
            }
        }

        // Deterministic compute micro-benchmark (src/bench/cpp/main.cpp).
        // Mirrors the `test` target but links no Boost test framework. Times
        // calculate_stable/unstable on fixed codes so backend changes can be
        // measured without LiLuMaxVary's run-to-run noise. Run: ./gradlew benchBackend
        bench(NativeExecutableSpec) {

            sources.cpp {
                lib library: 'backend', linkage: 'static'
            }

            binaries.all {

                cppCompiler.define "NDEBUG"
                cppCompiler.args '-O3', '-march=native', '-flto', '-ftrapv'
                if (currentOs.isMacOsX()){
                    cppCompiler.args '-I/opt/homebrew/include'
                    linker.args '-headerpad_max_install_names','-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread'
                } else {
                    linker.args '-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb12','-lboost_thread','-lboost_system'
                }

                if (toolChain in Clang) {
                    cppCompiler.args  '-Werror',
                                     '-Wno-padded', '-Wno-comma',
                                     '-Wno-disabled-macro-expansion', '-Wno-global-constructors',
                                     '-Wno-c++98-compat', '-Wno-c++98-compat-pedantic',
                                     '-std=c++17'
                }

                if (toolChain in Gcc) {
                    cppCompiler.args '-Wall', '-Wextra', '-Wpedantic', '-Werror',
                                     '-Wno-c++11-compat', '-Wno-c++14-compat',
                                     '-std=c++17'
                }
            }
        }
    }
}

task testBackend(type: Exec, dependsOn: 'testExecutable') {
    commandLine 'build/exe/test/test'

    // save the results here
    //standardOutput = new FileOutputStream('build/test-results/test.out')
    //errorOutput = new FileOutputStream('build/test-results/test.err')
}

task benchBackend(type: Exec, dependsOn: 'benchExecutable') {
    commandLine 'build/exe/bench/bench'
}

// Make sure the C++ code is up to date when running the Java program
run.dependsOn "backendSharedLibrary"
//run.dependsOn "coverExecutable"

run.doFirst {
    // Having this hardcoded isn't the best, put it works for now
    //environment 'LD_PRELOAD', '/usr/local/Cellar/jemalloc/5.0.1/lib/libjemalloc.so.2'
    //commandLine "./test.fish"
            // For native libraries
    environment 'JNA_LIBRARY_PATH', "$projectDir/build/libs/backend/shared"
    
    if (isMac) {
        environment 'DYLD_LIBRARY_PATH', "$projectDir/build/libs/backend/shared"
        jvmArgs = [
            '--module-path', configurations.runtimeClasspath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
    else if (isLinux) {
        environment 'LD_LIBRARY_PATH', "$projectDir/build/libs/backend/shared"
        jvmArgs = [
            '--module-path', '/usr/share/openjfx/lib',
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    } else {
        environment 'LD_LIBRARY_PATH', "$projectDir/build/libs/backend/shared"
        jvmArgs = [
            '--module-path', configurations.runtimeClasspath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

task createLibraryFolders {
    if (!file('build/dists/linux-x86-64').exists()) {
        file('build/dists/linux-x86-64').mkdirs()
        file('build/dists/x86-64-win32').mkdirs()
    }
}
task copyRuntimeLibs(type: Copy) {
    from configurations.runtimeClasspath
    into "$buildDir/libs"
}

task runtimeClasspathAsPath {
    doLast {
        println configurations.runtimeClasspath.asPath
    }
}